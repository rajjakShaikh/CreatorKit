<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="128" height="128" rx="64" fill="url(#bg)"/>
  <!-- Subtle pattern overlay -->
  <circle cx="20" cy="20" r="30" fill="white" fill-opacity="0.06"/>
  <circle cx="110" cy="100" r="40" fill="white" fill-opacity="0.04"/>
  <!-- Initials -->
  <text x="64" y="77" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="white" letter-spacing="-2">AC</text>
</svg>
